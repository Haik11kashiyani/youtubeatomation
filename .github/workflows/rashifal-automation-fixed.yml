name: Rashifal Automation - Generate 4AM, Upload All at 6AM

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 4:00 AM IST (22:30 UTC previous day) — videos generated now, uploaded at 6 AM
    - cron: '30 22 * * *'

permissions:
  contents: read

jobs:
  # JOB 1: Generate all 12 videos (4 AM IST) — uploads begin at 6 AM IST
  generate-videos:
    name: 🌙 Generate All 12 Videos (4 AM IST)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick fonts-noto
          if [ -f /etc/ImageMagick-6/policy.xml ]; then
            sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"\/>/<!-- disabled -->/g' /etc/ImageMagick-6/policy.xml
          fi

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --no-cache-dir -r requirements.txt

      - name: Install Playwright
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Generate all 12 videos
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          echo "🌙 Starting video generation at 4:00 AM IST"
          python orchestrate.py generate

      - name: Upload all 12 videos as artifact
        uses: actions/upload-artifact@v4
        with:
          name: all-12-videos
          path: outputs/*.mp4
          if-no-files-found: error
          retention-days: 1

      - name: Summary
        run: |
          echo "## 🌙 Generation Complete (4 AM IST)" >> $GITHUB_STEP_SUMMARY
          echo "✅ Generated: 12 videos" >> $GITHUB_STEP_SUMMARY
          echo "⏳ Next: All 3 upload batches will run back-to-back starting at 6 AM IST" >> $GITHUB_STEP_SUMMARY


  # JOB 2: Upload Batch 1 (6 AM IST) - starts immediately after generation job
  upload-batch1:
    name: 🌅 Upload Batch 1 - Rashis 1-4 (6 AM IST)
    runs-on: ubuntu-latest
    needs: generate-videos
    
    steps:
      - name: Start Batch 1 upload
        run: |
          echo "🌅 Starting Batch 1 upload (Rashis 1-4) at 6 AM IST"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Download all 12 videos
        uses: actions/download-artifact@v4
        with:
          name: all-12-videos
          path: outputs/

      - name: Upload Batch 1 (Rashis 1-4)
        env:
          PYTHONUNBUFFERED: "1"
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          echo "🌅 Uploading Batch 1: Rashis 1-4 (4 videos)"
          python orchestrate.py batch1

      - name: Upload remaining 8 videos
        uses: actions/upload-artifact@v4
        with:
          name: remaining-8-videos
          path: outputs/*.mp4
          if-no-files-found: error
          retention-days: 1

      - name: Summary
        run: |
          echo "## 🌅 Batch 1 Complete (6 AM IST)" >> $GITHUB_STEP_SUMMARY
          echo "✅ Uploaded: Rashis 1-4 (4 videos)" >> $GITHUB_STEP_SUMMARY
          REMAINING=$(ls -1 outputs/*.mp4 | wc -l)
          echo "📊 Remaining: $REMAINING videos" >> $GITHUB_STEP_SUMMARY
          echo "⏳ Next: Batch 2 uploading immediately..." >> $GITHUB_STEP_SUMMARY


  # JOB 3: Upload Batch 2 - immediately after Batch 1
  upload-batch2:
    name: 🌄 Upload Batch 2 - Rashis 5-8
    runs-on: ubuntu-latest
    needs: upload-batch1
    
    steps:
      - name: Start Batch 2 upload
        run: |
          echo "🌄 Starting Batch 2 upload (Rashis 5-8)"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Download remaining 8 videos
        uses: actions/download-artifact@v4
        with:
          name: remaining-8-videos
          path: outputs/

      - name: Upload Batch 2 (Rashis 5-8)
        env:
          PYTHONUNBUFFERED: "1"
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          echo "🌄 Uploading Batch 2: Rashis 5-8 (4 videos)"
          python orchestrate.py batch2

      - name: Upload remaining 4 videos
        uses: actions/upload-artifact@v4
        with:
          name: remaining-4-videos
          path: outputs/*.mp4
          if-no-files-found: error
          retention-days: 1

      - name: Summary
        run: |
          echo "## 🌄 Batch 2 Complete" >> $GITHUB_STEP_SUMMARY
          echo "✅ Uploaded: Rashis 5-8 (4 videos)" >> $GITHUB_STEP_SUMMARY
          REMAINING=$(ls -1 outputs/*.mp4 | wc -l)
          echo "📊 Remaining: $REMAINING videos" >> $GITHUB_STEP_SUMMARY
          echo "⏳ Next: Batch 3 uploading immediately..." >> $GITHUB_STEP_SUMMARY


  # JOB 4: Upload Batch 3 - immediately after Batch 2 - FINAL
  upload-batch3:
    name: ☀️ Upload Batch 3 - Rashis 9-12 - FINAL
    runs-on: ubuntu-latest
    needs: upload-batch2
    
    steps:
      - name: Start Final Batch upload
        run: |
          echo "☀️ Starting FINAL Batch 3 upload (Rashis 9-12)"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Download remaining 4 videos
        uses: actions/download-artifact@v4
        with:
          name: remaining-4-videos
          path: outputs/

      - name: Upload Batch 3 - FINAL (Rashis 9-12)
        env:
          PYTHONUNBUFFERED: "1"
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          echo "☀️ Uploading FINAL Batch 3: Rashis 9-12 (4 videos)"
          python orchestrate.py batch3

      - name: Final Summary
        run: |
          echo "## ☀️ ALL DONE! All 12 Videos Uploaded" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Uploaded:** Rashis 9-12 (4 videos)" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Total:** 12 videos uploaded successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Today's Summary:" >> $GITHUB_STEP_SUMMARY
          echo "- 🌙 4:00 AM IST: Generated 12 videos" >> $GITHUB_STEP_SUMMARY
          echo "- 🌅 6:00 AM IST: Upload started — Batch 1 (Rashis 1-4)" >> $GITHUB_STEP_SUMMARY
          echo "- 🌄 Right after Batch 1: Uploaded Rashis 5-8" >> $GITHUB_STEP_SUMMARY
          echo "- ☀️ Right after Batch 2: Uploaded Rashis 9-12" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 **Automation Complete! All videos uploaded at 6 AM IST!**" >> $GITHUB_STEP_SUMMARY
